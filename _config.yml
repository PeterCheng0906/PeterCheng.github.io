# ---- Site Settings ----
locale: "en-US"
title: "Peter Cheng"
email: "cyf0906@stanford.edu"
description: >
  Data scientist · MS Data Science @ Johns Hopkins · MA Computational NLP @ Stanford · Applied ML, fraud detection, credit risk, NLP research
url: "https://petercheng0906.github.io"
baseurl: "/PeterCheng.github.io"
repository: "PeterCheng0906/PeterCheng.github.io"

# Tell Jekyll to process the _pages folder (academicpages requires this)
include:
  - _pages

# ---- Author Info ----
author:
  name: "Peter Cheng"
  pronouns: "he/him"
  avatar: "profile.jpg"
  bio: "Data scientist · MS Data Science @ Johns Hopkins · MA Computational NLP @ Stanford. Applied ML for fraud, credit risk, and NLP research."
  location: "Bay Area, CA"
  employer: "Johns Hopkins · Stanford"
  email: "cyf0906@stanford.edu"
  github: "PeterCheng0906"
  linkedin: "Peter Cheng"

# ---- Navigation Menu ----
nav:
  - title: "About"
    url: /about/
  - title: "CV"
    url: /cv/
  - title: "Projects"
    url: /portfolio/
  - title: "Blog"
    url: /blog/
  - title: "Contact"
    url: /contact/

# ---- Collections ----
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/

# ---- Defaults ----
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true

# ---- Plugins ----
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# ---- Additional Settings ----
markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"
encoding: "utf-8"
sass:
  sass_dir: _sass
  style: compressed
permalink: /:categories/:title/
timezone: America/Los_Angeles
